name: mytunes
description: "Ma bibliothèque musique/vidéo personnelle, façon Spotify maison."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  file_picker: ^8.0.0+1
  just_audio: ^0.9.40
  video_player: ^2.9.1
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
